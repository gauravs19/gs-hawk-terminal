# GS Hawk Terminal Strategies Configuration
# Combination strategies correlate multiple screeners for higher conviction.

- name: POWER PUMP (Combo)
  description: "Perfect storm: Extreme Oversold + High Volume + Reversal Candle. Massive bounce potential."
  logic: ALL
  triggers:
    - "RSI Extreme Oversold <20"
    - "Volume Spike"
    - "Bullish Hammer"
  entry: "High of Hammer"
  stop_loss: "Low of Day"
  target_1: "EMA 20"
  min_rr: 3.0

- name: INSTITUTIONAL BREAKOUT (Combo)
  description: "Volume + 52W High + Supertrend. Big money is driving this higher."
  logic: ALL
  triggers:
    - "Near 52W High"
    - "Big Deal 3x+"
    - "Supertrend Bullish"
  entry: "Breakout Level"
  stop_loss: "prev_day_low"
  target_1: "5% Target"
  min_rr: 2.0

- name: VOLATILITY EXPLOSION (Combo)
  description: "BB Squeeze + Inside Bar + Volume Surge. Ready to blast in either direction (favoring trend)."
  logic: ALL
  triggers:
    - "BB Squeeze"
    - "Inside Bar"
    - "Volume Spike"
  entry: "Inside Bar High"
  stop_loss: "Inside Bar Low"
  target_1: "ATR x 2"
  min_rr: 2.5

- name: TREND CONTINUATION (Combo)
  description: "Price Above MA200 + RSI Divergence + Volume Climax. Professional trend-riding."
  logic: ALL
  triggers:
    - "Price Above MA200"
    - "RSI Divergence Setup"
    - "Momentum Breakout"
  entry: "Current Close"
  stop_loss: "EMA 50"
  target_1: "10% Target"
  min_rr: 2.5

# Legacy/Single-Trigger Strategies
- name: RSI Mean Reversion
  logic: ANY
  triggers:
    - "RSI Oversold <30"
    - "RSI Extreme Oversold <20"
- name: Trend Following
  logic: ANY
  triggers:
    - "Price Cross Above MA50"
    - "Supertrend Bullish"
- name: Institutional Activity
  logic: ANY
  triggers:
    - "Big Deal 3x+"
    - "Massive Volume 5x+"
